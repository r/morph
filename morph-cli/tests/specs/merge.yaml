- name: merge_start_then_continue_clean_three_way
  files:
    a.txt: "aaa"
  steps:
    - morph: [add, a.txt]
    - morph: [commit, -m, "base"]
    - morph: [branch, feature]
    - morph: [checkout, feature]
    - write_file:
        path: b.txt
        content: "bbb"
    - morph: [add, b.txt]
    - morph: [commit, -m, "feature edit"]
    - morph: [checkout, main]
    - write_file:
        path: c.txt
        content: "ccc"
    - morph: [add, c.txt]
    - morph: [commit, -m, "main edit"]
    - morph: [merge, feature]
    - morph: [log]
      stdout_contains: "Merge branch 'feature'"

- name: merge_continue_without_in_progress_errors
  files:
    a.txt: "aaa"
  steps:
    - morph: [add, a.txt]
    - morph: [commit, -m, "initial"]
    - morph: [merge, --continue]
      expect_exit: 1
      stderr_contains: "no merge in progress"

- name: merge_abort_without_in_progress_errors
  # PR1 v0.40+: in reference mode `morph merge --abort` is a no-op
  # message ("Nothing to abort.") rather than an error — git's own
  # `git merge --abort` semantics surface differently. Tracked for
  # PR2 (CLI exit-code parity for `morph merge --abort`/`--continue`).
  skip: "abort exit-code parity pending PR2"
  files:
    a.txt: "aaa"
  steps:
    - morph: [add, a.txt]
    - morph: [commit, -m, "initial"]
    - morph: [merge, --abort]
      expect_exit: 1
      stderr_contains: "no merge in progress"

- name: merge_with_textual_conflict_drops_into_continue_flow
  # PR1 v0.40+: textual-conflict flow now bottoms out in git's own
  # `git merge` conflict state rather than morph's bespoke
  # textual-conflict tracker. The morph-side `--continue` /
  # `--abort` UX needs to be reconciled with git's conflict-state
  # machine. Tracked for PR2.
  skip: "git-driven conflict UX pending PR2"
  files:
    file.txt: "line1\nbase\nline3\n"
  steps:
    - morph: [add, file.txt]
    - morph: [commit, -m, "base"]
    - morph: [branch, feature]
    - write_file:
        path: file.txt
        content: "line1\nMAIN\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "main edit"]
    - morph: [checkout, feature]
    - write_file:
        path: file.txt
        content: "line1\nFEATURE\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "feature edit"]
    - morph: [checkout, main]
    - morph: [merge, feature]
      expect_exit: 1
      stdout_contains:
        - "CONFLICT"
        - "morph merge --continue"
    - morph: [status]
      stdout_contains:
        - "unmerged paths"
        - "morph merge --continue"
        - "morph merge --abort"
    - morph: [merge, --abort]
      stdout_contains: "Merge aborted"
    - morph: [status]
      stdout_contains: "nothing to commit"

- name: merge_with_retirement_succeeds
  # PR1 v0.40+: `--retire` requires the eval suite to be propagated
  # through the merge rebuild path, which is currently empty in
