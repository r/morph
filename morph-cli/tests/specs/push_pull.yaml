# Push, fetch, and pull integration tests.
# Uses `cwd` to run morph in subdirectories for multi-repo tests.

- name: fetch_creates_remote_tracking_ref
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    # Create a commit in repo_a
    - write_file:
        path: repo_a/hello.txt
        content: "world"
    - morph: [add, hello.txt]
      cwd: repo_a
    - morph: [commit, -m, "first commit", --json]
      cwd: repo_a
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true

    # Fetch from repo_a into repo_b
    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [fetch, origin]
      cwd: repo_b
      stdout_contains: "origin/main"
  assert:
    - kind: file_exists
      path: repo_b/.morph/refs/remotes/origin/main

- name: pull_fast_forwards_local_branch
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    # Create commit in repo_a
    - write_file:
        path: repo_a/data.txt
        content: "data"
    - morph: [add, data.txt]
      cwd: repo_a
    - morph: [commit, -m, "remote commit"]
      cwd: repo_a

    # Pull into repo_b
    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [pull, origin, main]
      cwd: repo_b
      stdout_contains: "Updated"

    # Verify repo_b now has the commit
    - morph: [log]
      cwd: repo_b
      stdout_contains: "remote commit"

- name: push_non_fast_forward_fails
  init: false
  dirs:
    - local
    - remote
  steps:
    - morph: [init, "${repo}/local"]
    - morph: [init, "${repo}/remote"]

    # Divergent histories
    - write_file:
        path: local/local.txt
        content: "local"
    - morph: [add, local.txt]
      cwd: local
    - morph: [commit, -m, "local commit"]
      cwd: local

    - write_file:
        path: remote/remote.txt
        content: "remote"
    - morph: [add, remote.txt]
      cwd: remote
    - morph: [commit, -m, "remote commit"]
      cwd: remote

    # Push should fail
    - morph: [remote, add, origin, "${repo}/remote"]
      cwd: local
    - morph: [push, origin, main]
      cwd: local
      expect_exit: 1
      stderr_contains: "non-fast-forward"

- name: push_transfers_evidence_backed_commit_closure
  init: false
  dirs:
    - local
    - remote
  steps:
    - morph: [init, "${repo}/local"]
    - morph: [init, "${repo}/remote"]

    # Record a session in local
    - morph: [run, record-session, --prompt, "fix bug", --response, "done"]
      cwd: local
      capture: run_hash
      assert_hash: true

    # Create evidence-backed commit
    - write_file:
        path: local/code.txt
        content: "fn main() {}"
    - morph: [add, code.txt]
      cwd: local
    - morph: [commit, -m, "evidence commit", --from-run, "${run_hash}", --json]
      cwd: local
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true

    # Push to remote
    - morph: [remote, add, origin, "${repo}/remote"]
      cwd: local
    - morph: [push, origin, main]
      cwd: local
      stdout_contains: "Pushed"

    # Verify evidence objects exist in remote
    - morph: [show, "${commit_hash}"]
      cwd: remote
      stdout_contains:
        - "evidence_refs"
        - "${run_hash}"

- name: pull_diverged_without_merge_flag_errors_clearly
  # Cycle 29: when local and remote have diverged, plain `morph pull`
  # surfaces the typed Diverged error. Stays a hard failure so the
  # user sees the suggestion and chooses how to proceed.
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    - write_file:
        path: repo_a/shared.txt
        content: "base"
    - morph: [add, shared.txt]
      cwd: repo_a
    - morph: [commit, -m, "base"]
      cwd: repo_a

    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [pull, origin, main]
      cwd: repo_b

    # Diverge: each side adds a different file on `main`.
    - write_file:
        path: repo_a/remote_only.txt
        content: "R"
    - morph: [add, remote_only.txt]
      cwd: repo_a
    - morph: [commit, -m, "remote only"]
      cwd: repo_a

    - write_file:
        path: repo_b/local_only.txt
        content: "L"
    - morph: [add, local_only.txt]
      cwd: repo_b
    - morph: [commit, -m, "local only"]
      cwd: repo_b

    # Without --merge: clear divergence error.
    - morph: [pull, origin, main]
      cwd: repo_b
      expect_exit: 1
      stderr_contains:
        - "Diverged"
        - "main"

- name: pull_merge_flag_finalizes_clean_three_way
  # Cycle 30: with --merge, a divergence with no path-level overlap
  # finalizes a clean 3-way merge automatically (no needs_resolution).
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    - write_file:
        path: repo_a/shared.txt
        content: "base"
    - morph: [add, shared.txt]
      cwd: repo_a
    - morph: [commit, -m, "base"]
      cwd: repo_a

    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [pull, origin, main]
      cwd: repo_b

    - write_file:
        path: repo_a/remote_only.txt
        content: "R"
    - morph: [add, remote_only.txt]
      cwd: repo_a
    - morph: [commit, -m, "remote only"]
      cwd: repo_a

    - write_file:
        path: repo_b/local_only.txt
        content: "L"
    - morph: [add, local_only.txt]
      cwd: repo_b
    - morph: [commit, -m, "local only"]
      cwd: repo_b

    - morph: [pull, origin, main, --merge]
      cwd: repo_b
      stdout_contains:
        - "Merged"

    # Both files end up in the local working tree post-merge.
    - morph: [log]
      cwd: repo_b
      stdout_contains:
        - "Merge remote-tracking branch"
  assert:
    - kind: file_exists
      path: repo_b/local_only.txt
    - kind: file_exists
      path: repo_b/remote_only.txt

- name: pull_merge_flag_with_textual_conflicts_leaves_state_for_user
  # Cycle 31: textual conflicts ⇒ pull --merge exits non-zero with a
  # message pointing the user to `morph status` and `--continue`.
  # MERGE_HEAD must be present afterwards.
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    - write_file:
        path: repo_a/shared.txt
        content: "line1\nbase\nline3\n"
    - morph: [add, shared.txt]
      cwd: repo_a
    - morph: [commit, -m, "base"]
      cwd: repo_a

    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [pull, origin, main]
      cwd: repo_b

    - write_file:
        path: repo_a/shared.txt
        content: "line1\nREMOTE\nline3\n"
    - morph: [add, shared.txt]
      cwd: repo_a
    - morph: [commit, -m, "remote edit"]
      cwd: repo_a

    - write_file:
        path: repo_b/shared.txt
        content: "line1\nLOCAL\nline3\n"
    - morph: [add, shared.txt]
      cwd: repo_b
    - morph: [commit, -m, "local edit"]
      cwd: repo_b

    - morph: [pull, origin, main, --merge]
      cwd: repo_b
      expect_exit: 1
      stdout_contains:
        - "Merge needs resolution"
        - "morph merge --continue"
  assert:
    - kind: file_exists
      path: repo_b/.morph/MERGE_HEAD

# PR5 cycle 32: `morph sync` uses the configured upstream (saved by
# `morph branch --set-upstream`) and is equivalent to fetching +
# pulling --merge in one step.
- name: sync_fast_forwards_via_configured_upstream
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    - write_file:
        path: repo_a/data.txt
        content: "v1"
    - morph: [add, data.txt]
      cwd: repo_a
    - morph: [commit, -m, "v1"]
      cwd: repo_a

    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [branch, --set-upstream, "origin/main"]
      cwd: repo_b
    - morph: [sync]
      cwd: repo_b
      stdout_contains: "Synced main"
  assert:
    - kind: file_exists
      path: repo_b/.morph/refs/heads/main

- name: sync_errors_when_no_upstream_configured
  init: false
  dirs:
    - repo
  steps:
    - morph: [init, "${repo}/repo"]
    - write_file:
        path: repo/a.txt
        content: "x"
    - morph: [add, a.txt]
      cwd: repo
    - morph: [commit, -m, "init"]
      cwd: repo
    - morph: [sync]
      cwd: repo
      expect_exit: 1
      stderr_contains:
        - "no upstream configured"
        - "morph branch --set-upstream"

- name: refs_shows_remote_tracking_after_fetch
  init: false
  dirs:
    - repo_a
    - repo_b
  steps:
    - morph: [init, "${repo}/repo_a"]
    - morph: [init, "${repo}/repo_b"]

    # Create commit in repo_a
    - write_file:
        path: repo_a/file.txt
        content: "data"
    - morph: [add, file.txt]
      cwd: repo_a
    - morph: [commit, -m, "commit"]
      cwd: repo_a

    # Fetch into repo_b
    - morph: [remote, add, origin, "${repo}/repo_a"]
      cwd: repo_b
    - morph: [fetch, origin]
      cwd: repo_b

    # Refs should show both local and remote-tracking
    - morph: [refs]
      cwd: repo_b
      stdout_contains: "remotes/origin/main"
