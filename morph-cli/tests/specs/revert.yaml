# Tests for `morph revert`
- name: revert_creates_undo_commit
  files:
    a.txt: "original"
  steps:
    - morph: [add, .]
    - morph: [commit, -m, first, --json]
      capture_json_field:
        var: c1
        field: hash
    - write_file:
        path: a.txt
        content: "changed"
    - morph: [add, .]
    - morph: [commit, -m, second, --json]
      capture_json_field:
        var: c2
        field: hash
    - morph: [revert, "${c2}"]
      capture: revert_hash
      assert_hash: true
    - morph: [log]
      stdout_contains: "Revert"

- name: revert_invalid_hash_fails
  files:
    a.txt: "hello"
  steps:
    - morph: [add, .]
    - morph: [commit, -m, first]
    - morph: [revert, not-a-hash]
      expect_exit: 1
