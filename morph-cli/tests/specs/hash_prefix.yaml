# Tests for Git-style hash-prefix resolution in read-path commands.
# Any unambiguous prefix of ≥4 hex chars should resolve to the full hash.

- name: run_show_accepts_8char_prefix
  steps:
    - morph: [session, record, --prompt, "hi", --response, "hello"]
      capture: run_hash
      assert_hash: true
    - morph: [session, show, "${run_hash:.8}"]
      stdout_contains:
        - "run"
        - "trace"
    - morph: [session, show, "${run_hash:.12}"]
      stdout_contains:
        - "run"

- name: run_show_accepts_40char_prefix
  steps:
    - morph: [session, record, --prompt, "a", --response, "b"]
      capture: run_hash
      assert_hash: true
    - morph: [session, show, "${run_hash:.40}"]
      stdout_contains:
        - "run"
        - "trace"

- name: trace_show_accepts_prefix
  steps:
    - morph: [session, record, --prompt, "what?", --response, "answer"]
      capture: run_hash
      assert_hash: true
    - morph: [session, show, "${run_hash}", --json]
      capture_json_field:
        var: trace_hash
        field: trace
    - morph: [inspect, show, "${trace_hash:.8}"]
      stdout_contains:
        - "what?"
        - "answer"

- name: show_accepts_prefix
  steps:
    - morph: [session, record, --prompt, "show me", --response, "shown"]
      capture: run_hash
      assert_hash: true
    - morph: [show, "${run_hash:.10}"]
      stdout_contains:
        - '"type": "run"'
        - "pipeline"

- name: prefix_too_short_errors
  steps:
    - morph: [session, record, --prompt, "x", --response, "y"]
    - morph: [session, show, "abc"]
      expect_exit: 1
      stderr_contains: "invalid hash prefix"

- name: prefix_no_match_errors
  steps:
    - morph: [session, record, --prompt, "x", --response, "y"]
    - morph: [session, show, "deadbeef"]
      expect_exit: 1
      stderr_contains: "no object matches prefix"

- name: prefix_nonhex_errors
  steps:
    - morph: [session, record, --prompt, "x", --response, "y"]
    - morph: [session, show, "not-a-hash"]
      expect_exit: 1
      stderr_contains: "invalid hash prefix"
