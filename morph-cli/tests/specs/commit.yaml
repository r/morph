- name: commit_and_log
  files:
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0}]}'
  steps:
    - morph: [pipeline, create, prog.json]
      capture: prog_hash

    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash

    - morph: [commit, -m, first commit, --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, "{}", --json]
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true

    - morph: [log]
      stdout_contains: first commit

# Commit prints git-style summary to stdout by default.
- name: commit_prints_summary
  files:
    foo.txt: "hello"
  steps:
    - morph: [add, foo.txt]
    - morph: [commit, -m, "my first commit"]
      stdout_contains:
        - "[main (root-commit)"
        - "my first commit"
        - "1 file changed"

# Commit --json outputs structured JSON.
- name: commit_json_output
  files:
    bar.txt: "world"
  steps:
    - morph: [add, bar.txt]
    - morph: [commit, -m, "json test", --json]
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true
      stdout_contains:
        - "\"hash\""
        - "\"branch\""
        - "\"root_commit\""
        - "\"files_changed\""

# Commit project files only (no prompt/response yet). Check filesystem and CLI.
- name: commit_project_files_only
  files:
    foo.txt: "hello"
    bar.txt: "world"
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0}]}'
  steps:
    - morph: [add, foo.txt, bar.txt]
    - morph: [pipeline, create, prog.json]
      capture: prog_hash
    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash
    - morph: [commit, -m, first commit, --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, "{}", --json]
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true
    - morph: [log]
      stdout_contains: first commit
  assert:
    - kind: file_exists
      path: .morph/refs/heads/main

# Record session then commit files. Check filesystem and CLI.
- name: record_session_then_commit
  files:
    code.txt: "fn main() {}"
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0}]}'
  steps:
    - morph: [run, record-session, --prompt, "Fix the bug", --response, "Done."]
      capture: run_hash
      assert_hash: true
    - morph: [add, code.txt]
    - morph: [pipeline, create, prog.json]
      capture: prog_hash
    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash
    - morph: [commit, -m, with session, --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, "{}", --json]
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true
    - morph: [log]
      stdout_contains: with session
  assert:
    - kind: dir_not_empty
      path: .morph/runs
    - kind: dir_not_empty
      path: .morph/prompts
    - kind: file_exists
      path: .morph/refs/heads/main
