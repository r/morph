# Phase 4.3 (v0.48+): ingesting a YAML spec via `morph eval add`
# should build a fresh EvalSuite with one case per top-level document
# and wire it up as the policy default. Replaces the v0.46-removed
# `morph eval add-case`.

- name: eval_add_yaml_creates_default_suite
  files:
    specs/login.yaml: |
      - name: user_can_login
        steps:
          - morph: [status]
      - name: user_can_logout
        steps:
          - morph: [status]
  steps:
    - morph: [eval, add, specs/login.yaml]
      capture_first_line: suite_hash
      assert_hash: true
    - morph: [eval, show, --json]
      stdout_contains:
        - "user_can_login"
        - "user_can_logout"
        - "yaml_spec"

- name: eval_add_no_set_default_keeps_policy_unchanged
  files:
    specs/login.yaml: |
      - name: case_a
        steps:
          - morph: [status]
  steps:
    - morph: [eval, add, --no-set-default, specs/login.yaml]
      capture_first_line: suite_hash
      assert_hash: true
    - morph: [policy, show]
      stdout_contains: "\"default_eval_suite\": null"

- name: eval_add_extends_existing_default_suite
  files:
    specs/first.yaml: |
      - name: alpha
        steps:
          - morph: [status]
    specs/second.yaml: |
      - name: beta
        steps:
          - morph: [status]
  steps:
    - morph: [eval, add, specs/first.yaml]
      capture_first_line: suite_one
      assert_hash: true
    - morph: [eval, add, specs/second.yaml]
      capture_first_line: suite_two
      assert_hash: true
    - morph: [eval, show]
      stdout_contains:
        - "alpha"
        - "beta"
