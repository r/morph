# Tests for `morph trace show` command
- name: trace_show_displays_events
  steps:
    - morph: [session, record, --prompt, "Build the feature", --response, "Feature built successfully"]
      capture: run_hash
      assert_hash: true
    - morph: [session, show, "${run_hash}", --json]
      capture: run_json
    - morph: [session, show, "${run_hash}", --with-trace]
      stdout_contains:
        - "Build the feature"
        - "Feature built successfully"
