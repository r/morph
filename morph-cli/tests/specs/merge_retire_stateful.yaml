# Paper §4.3 enforcement, stateful path: when the user passes
# `--retire <metric>` to `morph merge <branch>` (without -m / --pipeline /
# --metrics), the merge drops into the start/continue flow. The retired
# metrics and reason must persist as a `MERGE_RETIRED.json` breadcrumb
# so a later `morph merge --continue` injects the same attributed
# `review` node a single-shot merge would have produced. `--abort` must
# clear the breadcrumb so a subsequent `--continue` reports no merge.

- name: merge_stateful_retire_clean_three_way_synthesizes_review_node
  files:
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0},{"name":"old_metric","aggregation":"mean","threshold":0.0}]}'
    a.txt: "aaa"
  steps:
    - morph: [pipeline, create, prog.json]
      capture: prog_hash
    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash
    - morph: [add, a.txt]
    - morph: [commit, -m, "base", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.9, "old_metric": 0.8}']
    - morph: [branch, feature]
    - morph: [checkout, feature]
    - write_file:
        path: b.txt
        content: "bbb"
    - morph: [add, b.txt]
    - morph: [commit, -m, "feature commit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.85, "old_metric": 0.7}']
    - morph: [checkout, main]
    - write_file:
        path: c.txt
        content: "ccc"
    - morph: [add, c.txt]
    - morph: [commit, -m, "main commit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.92, "old_metric": 0.85}']
    - morph: [merge, feature, --retire, old_metric, --retire-reason, "switching retrieval strategy"]
      capture: merge_hash
      assert_hash: true
    - morph: [show, "${merge_hash}"]
      capture_json_field:
        var: merge_pipeline
        field: pipeline
    - morph: [pipeline, show, "${merge_pipeline}"]
      stdout_contains:
        - "review-retirement-"
        - "old_metric"
        - "switching retrieval strategy"

- name: merge_stateful_retire_with_textual_conflict_then_continue
  files:
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0},{"name":"old_metric","aggregation":"mean","threshold":0.0}]}'
    file.txt: "line1\nbase\nline3\n"
  steps:
    - morph: [pipeline, create, prog.json]
      capture: prog_hash
    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash
    - morph: [add, file.txt]
    - morph: [commit, -m, "base", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.9, "old_metric": 0.8}']
    - morph: [branch, feature]
    - write_file:
        path: file.txt
        content: "line1\nMAIN\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "main edit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.92, "old_metric": 0.85}']
    - morph: [checkout, feature]
    - write_file:
        path: file.txt
        content: "line1\nFEATURE\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "feature edit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.88, "old_metric": 0.7}']
    - morph: [checkout, main]
    - morph: [merge, feature, --retire, old_metric, --retire-reason, "tracker swap"]
      expect_exit: 1
      stdout_contains:
        - "CONFLICT"
        - "morph merge --continue"
    - morph: [status]
      stdout_contains:
        - "unmerged paths"
        - "morph merge --continue"
    - write_file:
        path: file.txt
        content: "line1\nRESOLVED\nline3\n"
    - morph: [add, file.txt]
    - morph: [merge, --continue, -m, "merged with retire"]
      capture: merge_hash
      assert_hash: true
    - morph: [show, "${merge_hash}"]
      capture_json_field:
        var: merge_pipeline
        field: pipeline
    - morph: [pipeline, show, "${merge_pipeline}"]
      stdout_contains:
        - "review-retirement-"
        - "old_metric"
        - "tracker swap"

- name: merge_stateful_retire_abort_clears_breadcrumb
  files:
    prog.json: '{"graph":{"nodes":[{"id":"n1","kind":"identity","ref":null,"params":{}}],"edges":[]},"prompts":[],"eval_suite":null,"provenance":null}'
    .morph/evals/e.json: '{"cases":[],"metrics":[{"name":"acc","aggregation":"mean","threshold":0.0},{"name":"old_metric","aggregation":"mean","threshold":0.0}]}'
    file.txt: "line1\nbase\nline3\n"
  steps:
    - morph: [pipeline, create, prog.json]
      capture: prog_hash
    - morph: [add, .morph/evals/e.json]
      capture_first_line: suite_hash
    - morph: [add, file.txt]
    - morph: [commit, -m, "base", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.9, "old_metric": 0.8}']
    - morph: [branch, feature]
    - write_file:
        path: file.txt
        content: "line1\nMAIN\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "main edit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.92, "old_metric": 0.85}']
    - morph: [checkout, feature]
    - write_file:
        path: file.txt
        content: "line1\nFEATURE\nline3\n"
    - morph: [add, file.txt]
    - morph: [commit, -m, "feature edit", --pipeline, "${prog_hash}", --eval-suite, "${suite_hash}", --metrics, '{"acc": 0.88, "old_metric": 0.7}']
    - morph: [checkout, main]
    - morph: [merge, feature, --retire, old_metric, --retire-reason, "abandoned attempt"]
      expect_exit: 1
      stdout_contains: "CONFLICT"
    - morph: [merge, --abort]
      stdout_contains: "Merge aborted"
    # After abort, no merge is in progress: --continue must fail
    # cleanly. This proves all merge state, including the retirement
    # breadcrumb, has been cleared.
    - morph: [merge, --continue]
      expect_exit: 1
      stderr_contains: "no merge in progress"
