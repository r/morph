- name: version_flag_prints_version
  init: false
  steps:
    - morph: ["--version"]
      stdout_contains:
        - "morph 0.37.0 (built"
        - "Z)"

# PR 10: a real `morph version` subcommand that mirrors `--version`
# but also supports `--json` for release pipelines.
- name: version_subcommand_prints_human_line
  init: false
  steps:
    - morph: [version]
      stdout_contains:
        - "morph 0.37.0 (built"
        - "Z)"

- name: version_subcommand_json_emits_machine_readable_body
  init: false
  steps:
    - morph: [version, --json]
      stdout_contains:
        - '"name":"morph"'
        - '"version":"0.37.0"'
        - '"build_date":"'
        - '"protocol_version":'
        - '"supported_repo_versions":'
