# Phase 4.1 (v0.46): old surfaces `morph run *`, `morph eval add-case`,
# `morph eval suite-show`, `morph eval suite-from-specs` continue to
# work but emit a one-line stderr deprecation notice pointing at the
# new spelling. They're slated for removal in v0.48.

- name: run_list_emits_deprecation_notice
  steps:
    - morph: [run, list]
      stderr_contains:
        - "deprecated"
        - "morph session list"

- name: run_show_emits_deprecation_notice
  steps:
    - morph: [session, record, --prompt, "p", --response, "r"]
      capture: run_hash
      assert_hash: true
    - morph: [run, show, "${run_hash}"]
      stderr_contains:
        - "deprecated"
        - "morph session show"

- name: run_record_session_emits_deprecation_notice
  steps:
    - morph: [run, record-session, --prompt, "p", --response, "r"]
      stderr_contains:
        - "deprecated"
        - "morph session record"

- name: eval_add_case_emits_deprecation_notice
  files:
    spec.yaml: |
      - name: dummy
        steps:
          - morph: [status]
  steps:
    - morph: [eval, add-case, spec.yaml]
      stderr_contains:
        - "deprecated"
        - "morph eval add"

- name: eval_suite_show_emits_deprecation_notice
  files:
    spec.yaml: |
      - name: dummy
        steps:
          - morph: [status]
  steps:
    - morph: [eval, add, spec.yaml]
    - morph: [eval, suite-show]
      stderr_contains:
        - "deprecated"
        - "morph eval show"

- name: eval_suite_from_specs_emits_deprecation_notice
  files:
    specs/a.yaml: |
      - name: case_a
        steps:
          - morph: [status]
  steps:
    - morph: [eval, suite-from-specs, specs]
      stderr_contains:
        - "deprecated"
        - "morph eval rebuild"
