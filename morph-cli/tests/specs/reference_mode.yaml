# Reference mode: Morph sits alongside Git. Git owns file storage, Morph
# owns behavioral metadata. 1:1 commit coupling — every git commit gets a
# Morph commit (initially uncertified), and `morph certify` later attaches
# evidence to satisfy policy gates.
#
# These cases pin the contract for:
#   - `morph init --reference` (validates git repo, captures HEAD, installs hook)
#   - `morph reference-sync` (creates Morph commits from git HEAD)
#   - `morph status` (surfaces uncertified git-hook commits in reference mode)
#   - Late certification (the unified certification model from PR 1)

# ── init --reference ────────────────────────────────────────────────────

- name: reference_init_requires_git_repo
  init: false
  steps:
    - morph: [init, --reference, "${repo}"]
      expect_exit: 1
      stderr_contains: "not a git repository"

- name: reference_init_captures_git_head
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first git commit'"
    - morph: [init, --reference, "${repo}"]
      stdout_contains: "Initialized Morph repository in reference mode"
  assert:
    - kind: dir_exists
      path: .morph
    - kind: file_contains
      path: .morph/config.json
      contents: '"repo_mode": "reference"'
    - kind: file_contains
      path: .morph/config.json
      contents: '"init_at_git_sha"'

- name: reference_init_handles_empty_git_repo
  init: false
  steps:
    - shell: "git init -q -b main"
    - morph: [init, --reference, "${repo}"]
      stdout_contains: "Initialized Morph repository in reference mode"
  assert:
    - kind: file_contains
      path: .morph/config.json
      contents: '"repo_mode": "reference"'

- name: reference_init_installs_post_commit_hook
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first'"
    - morph: [init, --reference, "${repo}"]
  assert:
    - kind: file_exists
      path: .git/hooks/post-commit
    # PR4: hook contents migrated to the unified `morph hook <event>`
    # dispatcher. The assertion stays a substring check so future
    # script revisions don't force every spec to update.
    - kind: file_contains
      path: .git/hooks/post-commit
      contents: "morph hook post-commit"

- name: reference_init_conflicts_with_bare
  init: false
  steps:
    - morph: [init, --reference, --bare, "${repo}"]
      expect_exit: 2
      stderr_contains: "cannot be used with"

# ── reference-sync ──────────────────────────────────────────────────────

- name: reference_sync_creates_morph_commit_with_git_hook_origin
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first git commit'"
    - morph: [init, --reference, "${repo}"]
    # Mirror the init point first so the assertion below isolates
    # what `reference-sync` does for the *new* unmirrored commit
    # alone. Without this `sync_to_head` correctly walks back to the
    # last-mirrored ancestor (or root) and mirrors every intervening
    # commit — see `reference_mode_multi_commit_pull.yaml` for the
    # multi-commit walk-back contract.
    - morph: [reference-sync, --backfill]
    # MORPH_INTERNAL=1 suppresses the post-commit hook so the
    # explicit `morph reference-sync` below has work to do. Without
    # the env var the hook auto-mirrors the new commit and sync
    # reports "Already up to date" — which is the new normal in
    # PR4 reality but doesn't exercise the manual sync code path.
    - shell: "MORPH_INTERNAL=1 git commit --allow-empty -q -m 'second git commit'"
    - morph: [reference-sync]
      stdout_contains: "Synced 1 git commit"
    - morph: [head, --json]
      stdout_contains: "second git commit"
    - morph: [head, --json]
      stdout_contains: '"morph_origin": "git-hook"'

- name: reference_sync_idempotent_when_no_new_git_commits
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first'"
    - morph: [init, --reference, "${repo}"]
    # Mirror the init point first so the subsequent sync count is
    # isolated to the new commit (see explanation in
    # `reference_sync_creates_morph_commit_with_git_hook_origin`).
    - morph: [reference-sync, --backfill]
    - shell: "MORPH_INTERNAL=1 git commit --allow-empty -q -m 'second'"
    - morph: [reference-sync]
      stdout_contains: "Synced 1 git commit"
    - morph: [reference-sync]
      stdout_contains: "Already up to date"

- name: reference_sync_carries_git_commit_message
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first'"
    - morph: [init, --reference, "${repo}"]
    # Hook fires automatically here — that's the realistic path. The
    # explicit `reference-sync` below should be a no-op.
    - shell: "git commit --allow-empty -q -m 'feat: add user authentication'"
    - morph: [reference-sync]
    - morph: [log, --oneline, -n, "1"]
      stdout_contains: "feat: add user authentication"

- name: reference_sync_errors_outside_reference_mode
  steps:
    - morph: [reference-sync]
      expect_exit: 1
      stderr_contains: "not in reference mode"

# ── status integration ──────────────────────────────────────────────────

- name: reference_status_surfaces_pending_certifications
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first'"
    - morph: [init, --reference, "${repo}"]
    # Either path produces the same end state: the post-commit hook
    # fires automatically via PATH-injection, OR the explicit
    # `reference-sync` runs. We keep the explicit call so the
    # assertion is reproducible regardless of harness PATH state.
    - shell: "git commit --allow-empty -q -m 'second'"
    - morph: [reference-sync]
    - morph: [status]
      stdout_contains: "uncertified git-hook commit"

- name: reference_status_clears_pending_after_certify
  init: false
  steps:
    - shell: "git init -q -b main && git commit --allow-empty -q -m 'first'"
    - morph: [init, --reference, "${repo}"]
    # Backfill + certify the init point so the only pending commit
    # the rest of the test can produce is the new `second` commit.
    # Pre-Fix-1, `morph reference-sync` after the second `git commit`
    # mirrored only `second` and silently dropped `first` — the test
    # accidentally relied on that bug to land at "no pending" with
    # only one certify call. Fix 1 walks back to the last mirrored
    # ancestor, so we now certify the init point explicitly.
    - morph: [reference-sync, --backfill]
    - morph: [certify, --metrics, '{"tests_passed":10,"tests_total":10,"pass_rate":1.0}']
    - shell: "git commit --allow-empty -q -m 'second'"
    - morph: [reference-sync]
    - morph: [certify, --metrics, '{"tests_passed":10,"tests_total":10,"pass_rate":1.0}']
      stdout_contains: "PASS"
    - morph: [status]
      stdout_not_contains: "uncertified git-hook commit"
