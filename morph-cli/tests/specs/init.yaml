- name: init_creates_morph_dir
  init: false
  steps:
    - morph: [init, "${repo}"]
  assert:
    - kind: dir_exists
      path: .morph
    - kind: dir_exists
      path: .morph/objects
    - kind: dir_exists
      path: .morph/refs
    - kind: dir_exists
      path: .morph/refs/heads
    - kind: dir_exists
      path: .morph/prompts
    - kind: dir_exists
      path: .morph/evals

- name: init_does_not_create_top_level_dirs
  assert:
    - kind: dir_not_exists
      path: prompts
    - kind: dir_not_exists
      path: programs
    - kind: dir_not_exists
      path: evals

- name: init_prints_message
  init: false
  steps:
    - morph: [init, "${repo}"]
      stdout_contains: "Initialized empty Morph repository"

# After fresh init, CLI commands in repo root should behave sensibly (Cursor perspective).
- name: init_then_cli_sane
  init: false
  steps:
    - morph: [init, "${repo}"]
      stdout_contains: "Initialized empty Morph repository"
    - morph: [status]
      stdout_contains: "nothing to commit"
    - morph: [log]
      # No commits yet; log is empty (success, no output)

# Init in already-initialized directory must error with a clear message.
- name: init_already_initialized
  init: false
  steps:
    - morph: [init, "${repo}"]
      stdout_contains: "Initialized empty Morph repository"
    - morph: [init, "${repo}"]
      expect_exit: 1
      stderr_contains: "already a morph repository"

- name: init_shows_absolute_path
  init: false
  steps:
    - morph: [init, "${repo}"]
      stdout_contains: ".morph/"

# PR 6 stage D cycle 16: `morph init --bare` lays out the repo at
# `path` itself with no `.morph/` wrapper and `bare = true` in
# config.json.
- name: init_bare_at_root
  init: false
  steps:
    - morph: [init, --bare, "${repo}"]
      stdout_contains: "Initialized bare Morph repository"
  assert:
    - kind: dir_exists
      path: objects
    - kind: dir_exists
      path: refs/heads
    - kind: dir_not_exists
      path: .morph
    - kind: file_not_exists
      path: .gitignore
    - kind: file_contains
      path: config.json
      contents: '"bare": true'

- name: init_bare_already_initialized
  init: false
  steps:
    - morph: [init, --bare, "${repo}"]
    - morph: [init, --bare, "${repo}"]
      expect_exit: 1
      stderr_contains: "already a morph repository"
