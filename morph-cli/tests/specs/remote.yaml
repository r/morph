# Remote configuration tests.

- name: remote_add_and_list
  dirs:
    - remote_repo
  steps:
    - morph: [init, "${repo}/remote_repo"]
    - morph: [remote, add, origin, "${repo}/remote_repo"]
      stdout_contains: "Remote 'origin' added"
    - morph: [remote, list]
      stdout_contains: "origin"

- name: remote_add_multiple
  dirs:
    - remote_a
    - remote_b
  steps:
    - morph: [init, "${repo}/remote_a"]
    - morph: [init, "${repo}/remote_b"]
    - morph: [remote, add, alpha, "${repo}/remote_a"]
    - morph: [remote, add, beta, "${repo}/remote_b"]
    - morph: [remote, list]
      stdout_contains:
        - "alpha"
        - "beta"

- name: push_branch_to_empty_remote
  dirs:
    - remote_repo
  files:
    hello.txt: "world"
  steps:
    - morph: [init, "${repo}/remote_repo"]
    - morph: [remote, add, origin, "${repo}/remote_repo"]
    - morph: [add, hello.txt]
    - morph: [commit, -m, "first commit", --json]
      capture_json_field:
        var: commit_hash
        field: hash
      assert_hash: true
    - morph: [push, origin, main]
      stdout_contains: "Pushed"
  assert:
    - kind: file_exists
      path: remote_repo/.morph/refs/heads/main

- name: push_already_up_to_date
  dirs:
    - remote_repo
  files:
    hello.txt: "world"
  steps:
    - morph: [init, "${repo}/remote_repo"]
    - morph: [remote, add, origin, "${repo}/remote_repo"]
    - morph: [add, hello.txt]
    - morph: [commit, -m, "first"]
    - morph: [push, origin, main]
      stdout_contains: "Pushed"
    - morph: [push, origin, main]
      stdout_contains: "Pushed"

- name: push_to_missing_remote_fails
  files:
    hello.txt: "world"
  steps:
    - morph: [add, hello.txt]
    - morph: [commit, -m, "first"]
    - morph: [push, nosuch, main]
      expect_exit: 1
      stderr_contains: "not found"

- name: refs_shows_local_branches
  files:
    hello.txt: "world"
  steps:
    - morph: [add, hello.txt]
    - morph: [commit, -m, "first"]
    - morph: [branch, feature]
    - morph: [refs]
      stdout_contains:
        - "heads/main"
        - "heads/feature"
