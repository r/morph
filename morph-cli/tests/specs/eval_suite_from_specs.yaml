# Phase 4.3 (v0.48+): `morph eval rebuild` walks a directory tree of
# mixed YAML/.feature files and rebuilds the default suite from
# scratch. Replaces the v0.46-removed `morph eval suite-from-specs`.

- name: eval_rebuild_walks_directory
  files:
    spec/login.yaml: |
      - name: user_can_login
        steps:
          - morph: [status]
    spec/logout.feature: |
      Feature: logout
        Scenario: graceful logout
          Given I am logged in
          When I click logout
          Then I am redirected to /login
        Scenario: forced logout
          When the session expires
          Then I am redirected to /login
    spec/notes.txt: "ignored — not a spec\n"
  steps:
    - morph: [eval, rebuild, spec/]
      capture_first_line: suite_hash
      assert_hash: true
    - morph: [eval, show, --json]
      stdout_contains:
        - "user_can_login"
        - "graceful logout"
        - "forced logout"
    - morph: [eval, show]
      stdout_not_contains: "ignored"
